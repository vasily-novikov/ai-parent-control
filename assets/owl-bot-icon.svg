<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Friendly Owl Bot Icon</title>
  <desc id="desc">A friendly cartoon owl with round glasses on a warm circular background.</desc>

  <defs>
